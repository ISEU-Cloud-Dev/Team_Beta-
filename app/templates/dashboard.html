<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-boxes-stacked"></i>
                <h2>Smart Inventory</h2>
            </div>

            <nav class="sidebar-menu">
                <button onclick="loadModule('inicio')"><i class="fa-solid fa-house"></i>Dashboard</button>
                <button onclick="loadModule('productos')"><i class="fa-solid fa-box"></i>Productos</button>
                <button onclick="loadModule('categorias')"><i class="fa-solid fa-layer-group"></i>Categorías</button>
                <button onclick="loadModule('alertas')"><i class="fa-solid fa-triangle-exclamation"></i>Alertas</button>
                <button onclick="loadModule('reportes')"><i class="fa-solid fa-file-pdf"></i>Reportes</button>
                <button onclick="loadModule('perfil')"><i class="fa-solid fa-user"></i>Perfil</button>
            </nav>

            <button type="button" id="logoutBtn" class="logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar sesión
            </button>
        </aside>

        <main class="main-content">
            <header>
                <div>
                    <h1 id="title">Dashboard</h1>
                    <p>Bienvenido al Sistema Inteligente de Inventario</p>
                </div>

                <div class="top-right">
                    <div class="clock">
                        <i class="fa-solid fa-clock"></i>
                        <span id="hora">00:00:00</span>
                    </div>
                    <div class="notification">
                        <i class="fa-solid fa-bell"></i>
                        <span>3</span>
                    </div>
                    <div class="profile">
                        <img src="https://i.pravatar.cc/45">
                        <div>
                            <h4>Administrador</h4>
                            <p>admin@empresa.com</p>
                        </div>
                    </div>
                </div>
            </header>

            <section id="main-content"></section>
        </main>
    </div>

    <script src="/static/js/dashboard.js?v=2"></script>
</body>
</html>
